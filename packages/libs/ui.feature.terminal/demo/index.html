<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Spectral Terminal Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; height: 100vh; }
    #container { border: 1px solid #333; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
    #titlebar { background: #16213e; color: #8888aa; padding: 8px 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .red { background: #ff5f57; } .yellow { background: #febc2e; } .green { background: #28c840; }
    .title { flex: 1; text-align: center; }
    canvas { display: block; }
    #status { background: #16213e; color: #666; padding: 4px 16px; font-size: 11px; font-family: monospace; }
  </style>
</head>
<body>
  <div id="container">
    <div id="titlebar">
      <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
      <span class="title">Spectral Terminal Demo — Bun.Terminal + libghostty-vt WASM + WebGL 2</span>
    </div>
    <canvas id="terminal" width="960" height="540"></canvas>
    <div id="status">Loading WASM...</div>
  </div>
  <script src="/build/client.js"></script>
</body>
</html>
