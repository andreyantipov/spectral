receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
        cors:
          allowed_origins:
            - "http://localhost:*"
            - "https://localhost:*"
      grpc:
        endpoint: "0.0.0.0:4317"

exporters:
  file:
    path: /tmp/ctrl-page-telemetry.jsonl
    flush_interval: 1s
  debug:
    verbosity: basic

service:
  telemetry:
    metrics:
      level: none
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [file, debug]
    logs:
      receivers: [otlp]
      exporters: [file, debug]
    metrics:
      receivers: [otlp]
      exporters: [file]
