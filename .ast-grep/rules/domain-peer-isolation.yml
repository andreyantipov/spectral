# Sibling packages within same layer cannot import each other

id: feature-no-peer-feature
language: TypeScript
severity: error
message: "feature.* cannot import other feature.* packages"
files:
  - "packages/libs/feature.*/src/**/*.ts"
  - "packages/libs/feature.*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "feature\\."

---

