# Sibling packages within same layer cannot import each other
# GritQL equivalent: domain_peer_isolation.md

id: feature-no-peer-feature
language: TypeScript
severity: error
message: "domain.feature.* cannot import other domain.feature.*"
files:
  - "packages/libs/domain.feature.*/src/**/*.ts"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "domain\\.feature\\."

---

