id: feature-no-pubsub
language: typescript
rule:
  pattern: PubSub.$_($$$)
files:
  - "packages/libs/feature.*/src/**/*.ts"
message: "feature.* must be pure business logic. No PubSub — reactive behavior belongs in services."
severity: error
---
id: feature-no-stream-frompubsub
language: typescript
rule:
  pattern: Stream.fromPubSub($$$)
files:
  - "packages/libs/feature.*/src/**/*.ts"
message: "feature.* must be pure business logic. No Stream.fromPubSub — reactive behavior belongs in services."
severity: error
