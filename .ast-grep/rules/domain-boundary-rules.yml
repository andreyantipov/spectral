# Enforces hexagonal architecture layer boundaries

id: ui-no-domain
language: TypeScript
severity: error
message: "ui.* cannot import domain.* — use core.ui.api (EventBus)"
files:
  - "packages/libs/ui.*/src/**/*.ts"
  - "packages/libs/ui.*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "domain\\."

---

id: apps-no-ui-feature
language: TypeScript
severity: error
message: "apps/* cannot import ui.feature.* directly (use ui.scene.*)"
files:
  - "packages/apps/*/src/**/*.ts"
  - "packages/apps/*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "ui\\.feature\\."

---

id: feature-no-service-or-adapter
