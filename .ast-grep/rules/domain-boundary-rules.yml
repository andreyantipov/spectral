# Enforces hexagonal architecture layer boundaries

id: ui-no-domain
language: TypeScript
severity: error
message: "ui.base.* and ui.scene.* cannot import feature.* (non-UI) directly — use ui.base.api (EventBus)"
files:
  - "packages/libs/ui.base.*/src/**/*.ts"
  - "packages/libs/ui.base.*/src/**/*.tsx"
  - "packages/libs/ui.scene.*/src/**/*.ts"
  - "packages/libs/ui.scene.*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "@ctrl/feature\\."

---

id: apps-no-ui-feature
language: TypeScript
severity: error
message: "apps/* cannot import ui.feature.* directly (use ui.scene.*)"
files:
  - "packages/apps/*/src/**/*.ts"
  - "packages/apps/*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "ui\\.feature\\."

---

id: feature-no-service-or-impl
language: TypeScript
severity: error
message: "feature.* cannot import arch.impl.* directly"
files:
  - "packages/libs/feature.*/src/**/*.ts"
  - "packages/libs/feature.*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "arch\\.impl\\."

---

id: core-no-domain-or-ui
language: TypeScript
severity: error
message: "arch.* cannot import feature.* or ui.*"
files:
  - "packages/libs/arch.*/src/**/*.ts"
  - "packages/libs/arch.*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "(feature\\.|ui\\.(feature|scene)\\.)"
