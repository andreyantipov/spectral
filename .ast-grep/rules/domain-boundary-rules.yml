# Enforces hexagonal architecture layer boundaries
# GritQL equivalent: domain_boundary_rules.md

id: ui-no-feature-or-adapter
language: TypeScript
severity: error
message: "ui.* cannot import domain.feature.* or domain.adapter.*"
files:
  - "packages/libs/ui.*/src/**/*.ts"
  - "packages/libs/ui.*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "domain\\.(feature|adapter)\\."

---

id: apps-no-ui-feature
language: TypeScript
severity: error
message: "apps/* cannot import ui.feature.* directly (use ui.scenes)"
files:
  - "packages/apps/*/src/**/*.ts"
  - "packages/apps/*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "ui\\.feature\\."

---

