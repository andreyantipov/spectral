# TSX variants of import boundary rules
# ast-grep TypeScript parser cannot parse JSX in .tsx files,
# so all import-matching rules need Tsx language variants for .tsx files.

id: ui-no-domain--tsx
language: Tsx
severity: error
message: "ui.* cannot import domain.* — use core.ui.api (EventBus)"
files:
  - "packages/libs/ui.*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "domain\\."

---

id: apps-no-ui-feature--tsx
language: Tsx
severity: error
message: "apps/* cannot import ui.feature.* directly (use ui.scene.*)"
files:
  - "packages/apps/*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "ui\\.feature\\."

---

id: feature-no-service-or-adapter--tsx
