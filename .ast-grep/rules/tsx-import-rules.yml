---

id: no-relative-styled-system--tsx
language: Tsx
severity: error
message: "No relative styled-system imports — use @styled-system alias"
files:
  - "packages/**/*.tsx"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "\\.\\./.*styled-system/"

---

id: no-cva-in-core-ui--tsx
language: Tsx
severity: error
message: "No cva in core.ui — use sva only"
files:
  - "packages/libs/core.ui/**/*.tsx"
rule:
  pattern: cva($$$ARGS)

---

id: no-interface-in-libs--tsx
language: Tsx
severity: error
message: "No interface in packages/libs — use type"
files:
  - "packages/libs/**/*.tsx"
rule:
  kind: interface_declaration

---

id: no-declare-module--tsx
language: Tsx
severity: error
message: "No declare module in application code"
files:
  - "packages/libs/**/*.tsx"
  - "packages/apps/**/*.tsx"
rule:
  pattern: declare module $_ { $$$BODY }

---

id: no-lint-ignore-biome--tsx
language: Tsx
severity: error
message: "No biome-ignore — fix the underlying issue"
files:
  - "packages/**/*.tsx"
rule:
  kind: comment
  regex: "biome-ignore"

---

id: no-lint-ignore-ts--tsx
language: Tsx
severity: error
message: "No @ts-ignore/@ts-nocheck — fix the underlying issue"
files:
  - "packages/**/*.tsx"
rule:
  kind: comment
  regex: "@ts-(ignore|nocheck|expect-error)"

---

id: core-components-no-domain--tsx
language: Tsx
severity: error
message: "core.ui.components cannot import domain.*, core.ui.api, or core.port.*"
files:
  - "packages/libs/core.ui.components/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "(domain\\.|core\\.ui\\.api|core\\.port\\.)"
