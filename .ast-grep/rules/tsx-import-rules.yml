severity: error
message: "domain.feature.* cannot import domain.service.* or domain.adapter.*"
files:
  - "packages/libs/domain.feature.*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "domain\\.(service|adapter)\\."

---

id: core-no-domain-or-ui--tsx
language: Tsx
severity: error
message: "arch.* cannot import domain.* or ui.*"
