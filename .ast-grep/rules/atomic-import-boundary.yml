# Enforces one-way import deps in core.ui atomic design

id: atoms-no-higher-import
language: TypeScript
severity: error
message: "atoms cannot import from molecules, organisms, or templates"
files:
  - "packages/libs/core.ui/src/components/atoms/**/*.ts"
  - "packages/libs/core.ui/src/components/atoms/**/*.tsx"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "(molecules|organisms|templates)"

---

id: molecules-no-higher-import
language: TypeScript
severity: error
message: "molecules cannot import from organisms or templates"
files:
  - "packages/libs/core.ui/src/components/molecules/**/*.ts"
  - "packages/libs/core.ui/src/components/molecules/**/*.tsx"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "(organisms|templates)"

---

id: organisms-no-template-import
language: TypeScript
severity: error
message: "organisms cannot import from templates"
files:
  - "packages/libs/core.ui/src/components/organisms/**/*.ts"
  - "packages/libs/core.ui/src/components/organisms/**/*.tsx"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "templates"
