# core.ui.components is pure presentational — no domain, api, or port imports

id: core-components-no-domain
language: TypeScript
severity: error
message: "core.ui.components cannot import domain.*, core.ui.api, or core.port.*"
files:
  - "packages/libs/core.ui.components/src/**/*.ts"
  - "packages/libs/core.ui.components/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "(domain\\.|core\\.ui\\.api|core\\.port\\.)"
