# ui.base.components is pure presentational — no feature, api, or contract imports

id: core-components-no-domain
language: TypeScript
severity: error
message: "ui.base.components cannot import feature.*, ui.base.api, or arch.contract.*"
files:
  - "packages/libs/ui.base.components/src/**/*.ts"
  - "packages/libs/ui.base.components/src/**/*.tsx"
ignores:
  - "**/*.test.*"
rule:
  pattern: import $_ from "$PATH"
constraints:
  PATH:
    regex: "(feature\\.|ui\\.base\\.api|arch\\.contract\\.)"
