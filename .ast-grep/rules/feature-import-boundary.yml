id: feature-no-adapter-import
language: typescript
rule:
  any:
    - pattern: import $$$_ from "@ctrl/arch.impl.$$$"
    - pattern: 'export { $$$ } from "@ctrl/arch.impl.$$$"'
    - pattern: 'export * from "@ctrl/arch.impl.$$$"'
    - pattern: 'export * as $$_ from "@ctrl/arch.impl.$$$"'
files:
  - "packages/libs/domain.feature.*/src/**/*.ts"
message: "domain.feature.* cannot import arch.impl.* directly. Use port tags via DI."
severity: error
---
id: no-deleted-service-factory
language: typescript
rule:
  pattern: import $$$_ from "@ctrl/core.base.service-factory"
message: "core.base.service-factory has been deleted. Services should use EventLog handlers directly."
severity: error
