id: no-raw-electrobun-import
language: typescript
rule:
  any:
    - pattern: import $$$_ from "electrobun$$$"
    - pattern: 'export { $$$ } from "electrobun$$$"'
    - pattern: 'export * from "electrobun$$$"'
    - pattern: 'export * as $$_ from "electrobun$$$"'
    - pattern: import("electrobun$$$")
files:
  - "packages/libs/feature.*/src/**/*.ts"
  - "packages/libs/arch.*/src/**/*.ts"
  - "packages/libs/ui.*/src/**/*.ts"
message: "Raw electrobun imports only allowed in arch.impl.*. Use NativeApi tag via DI."
severity: error
