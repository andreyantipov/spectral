# No re-exports from @ctrl/* packages in barrel files (core/ui packages)

id: no-reexport-named
language: TypeScript
severity: error
message: "No re-exports from @ctrl/* in barrel files — only relative exports"
files:
  - "packages/libs/core.*/src/index.ts"
  - "packages/libs/ui.*/src/index.ts"
rule:
  pattern: export { $$$NAMES } from "$PATH"
constraints:
  PATH:
    regex: "@ctrl/"

---

id: no-reexport-type
language: TypeScript
severity: error
message: "No type re-exports from @ctrl/* in barrel files"
files:
  - "packages/libs/core.*/src/index.ts"
  - "packages/libs/ui.*/src/index.ts"
rule:
  pattern: export type { $$$NAMES } from "$PATH"
constraints:
  PATH:
    regex: "@ctrl/"

---

id: no-reexport-star
language: TypeScript
severity: error
message: "No wildcard re-exports from @ctrl/* in barrel files"
files:
  - "packages/libs/core.*/src/index.ts"
  - "packages/libs/ui.*/src/index.ts"
rule:
  pattern: export * from "$PATH"
constraints:
  PATH:
    regex: "@ctrl/"
