# Effect-specific rules

id: no-async-in-bun-layer
language: TypeScript
severity: error
message: "No raw async/await in Effect bun layer — use Effect.gen"
files:
  - "packages/*/src/bun/**/*.ts"
  - "packages/*/src/bun/**/*.tsx"
rule:
  pattern: async function $NAME($$$ARGS) { $$$BODY }

---

id: no-manual-withspan
language: TypeScript
severity: error
message: "No manual Effect.withSpan — use withTracing() wrapper"
files:
  - "packages/libs/**/*.ts"
  - "packages/libs/**/*.tsx"
ignores:
  - "**/with-tracing.ts"
rule:
  pattern: Effect.withSpan($$$ARGS)

---

id: domain-requires-tracing
language: TypeScript
severity: error
message: "Domain layers must wrap service impl with withTracing()"
files:
  - "packages/libs/domain.*/src/**/*.ts"
  - "packages/libs/domain.*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
  - "**/*test-utils*"
  - "**/*.test-utils.*"
  - "packages/libs/domain.runtime.*/src/**"
rule:
  pattern: Layer.succeed($TAG, $OBJ)
  not:
    has:
      pattern: withTracing($$$ARGS)
      stopBy: end

---

id: domain-requires-tracing-effect
language: TypeScript
severity: error
message: "Domain layers must wrap service impl with withTracing()"
files:
  - "packages/libs/domain.*/src/**/*.ts"
  - "packages/libs/domain.*/src/**/*.tsx"
ignores:
  - "**/*.test.*"
  - "**/*test-utils*"
  - "**/*.test-utils.*"
  - "packages/libs/domain.runtime.*/src/**"
rule:
  pattern: Layer.effect($TAG, $OBJ)
  not:
    has:
      pattern: withTracing($$$ARGS)
      stopBy: end
