name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v7
        with:
          version: "latest"
          verb: call
          module: packages/infra/ci
          args: lint --source=.

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v7
        with:
          version: "latest"
          verb: call
          module: packages/infra/ci
          args: typecheck --source=.

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v7
        with:
          version: "latest"
          verb: call
          module: packages/infra/ci
          args: build --source=.

  build-desktop:
    name: Build Desktop (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Build libs
        run: bunx turbo build --filter=!@ctrl/desktop
      - name: Build desktop app
        working-directory: packages/apps/desktop
        run: bun run build
      - name: Verify .app exists
        run: ls -la packages/apps/desktop/build/ctrl.page.app || ls -la packages/apps/desktop/dist/
